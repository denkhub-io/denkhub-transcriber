appId: com.denkhub.transcriber
productName: DenkHub Transcriber
copyright: Copyright 2026 DenkHub

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - denkhub-kit/**/*
  - "!**/*.{ts,map}"
  - "!**/CHANGELOG.md"
  - "!**/README.md"
  - "!node_modules/nodejs-whisper/cpp/**"

asarUnpack:
  - "node_modules/ffmpeg-static/**"
  - "node_modules/nodejs-whisper/**"
  - "!node_modules/nodejs-whisper/cpp/**"
  - "node_modules/better-sqlite3/**"

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  extraResources:
    - from: vendor/darwin/
      to: vendor/darwin/
      filter:
        - "**/*"
        - "!**/._*"
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  artifactName: "DenkHub-Transcriber-mac.dmg"

win:
  icon: assets/icon.png
  extraResources:
    - from: vendor/win32/
      to: vendor/win32/
      filter:
        - "**/*"
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  artifactName: "DenkHub-Transcriber-Setup.exe"

npmRebuild: true
asar:
  smartUnpack: true
electronLanguages: ["en", "it"]

afterPack: scripts/fix-dylibs.js
